<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ashad Umar's Website</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f4;
    }

    #welcomeScreen {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, #ffffff 0%, #ececec 60%, #d8d8d8 100%);
      z-index: 10;
    }

    .card {
      width: min(520px, 92vw);
      padding: 38px 30px;
      text-align: center;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #d8d8d8;
      border-radius: 22px;
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.16);
    }

    .card h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 6vw, 44px);
      color: #111;
    }

    .card p {
      margin: 0 0 28px;
      font-size: clamp(17px, 3vw, 21px);
      color: #444;
    }

    #yesButton {
      border: none;
      border-radius: 999px;
      padding: 14px 42px;
      font-size: 19px;
      font-weight: 700;
      color: white;
      background: #111;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.25);
      transition: transform 0.18s ease, background 0.18s ease;
    }

    #yesButton:hover {
      transform: scale(1.05);
      background: #2b2b2b;
    }

    #yesButton:active {
      transform: scale(0.96);
    }

    #jumpscare {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 9999;
    }

    #ghostImage {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      transform: scale(0.2);
      filter: contrast(1.45) brightness(0.72);
      user-select: none;
      pointer-events: none;
    }

    #jumpscare.active {
      display: flex;
      animation: screenShake 0.075s infinite alternate;
    }

    #jumpscare.active #ghostImage {
      animation:
        attackZoom 0.42s cubic-bezier(.1, .9, .2, 1) forwards,
        unsettlingPulse 0.23s 0.42s infinite alternate;
    }

    #flash {
      position: fixed;
      inset: 0;
      display: none;
      pointer-events: none;
      z-index: 10000;
      background: rgba(255, 255, 255, 0.65);
    }

    #flash.active {
      display: block;
      animation: quickFlash 0.45s steps(2, end) forwards;
    }

    @keyframes attackZoom {
      0% {
        transform: scale(0.12) rotate(-4deg);
        filter: contrast(1.2) brightness(0.35) blur(3px);
      }
      35% {
        transform: scale(1.35) rotate(3deg);
        filter: contrast(2) brightness(1.1) blur(0);
      }
      100% {
        transform: scale(1.08) rotate(0);
        filter: contrast(1.6) brightness(0.68);
      }
    }

    @keyframes unsettlingPulse {
      from {
        transform: scale(1.06);
        filter: contrast(1.5) brightness(0.58);
      }
      to {
        transform: scale(1.14);
        filter: contrast(1.9) brightness(0.84);
      }
    }

    @keyframes screenShake {
      0%   { transform: translate(-7px, 4px) rotate(-0.7deg); }
      50%  { transform: translate(6px, -5px) rotate(0.6deg); }
      100% { transform: translate(-3px, -2px) rotate(-0.3deg); }
    }

    @keyframes quickFlash {
      0%   { opacity: 0; }
      18%  { opacity: 1; }
      38%  { opacity: 0; }
      58%  { opacity: 0.6; }
      100% { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      #jumpscare.active,
      #jumpscare.active #ghostImage,
      #flash.active {
        animation: none;
      }

      #ghostImage {
        transform: scale(1.08);
      }
    }
  </style>
</head>
<body>
  <main id="welcomeScreen">
    <section class="card">
      <h1>Welcome to Ashad Umar's Website.</h1>
      <p>Would you like to move on?</p>
      <button id="yesButton" type="button">Yes</button>
    </section>
  </main>

  <section id="jumpscare" aria-hidden="true">
    <img id="ghostImage" src="ghost.png" alt="" />
  </section>

  <div id="flash" aria-hidden="true"></div>

  <audio id="scareSound" preload="auto">
    <source src="jumpscare.wav" type="audio/wav" />
  </audio>

  <script>
    const button = document.getElementById("yesButton");
    const welcome = document.getElementById("welcomeScreen");
    const jumpscare = document.getElementById("jumpscare");
    const flash = document.getElementById("flash");
    const sound = document.getElementById("scareSound");

    button.addEventListener("click", async () => {
      welcome.style.display = "none";
      jumpscare.classList.add("active");
      jumpscare.setAttribute("aria-hidden", "false");
      flash.classList.add("active");

      sound.currentTime = 0;
      sound.volume = 1;

      try {
        await sound.play();
      } catch (error) {
        console.log("The browser blocked audio playback:", error);
      }

      // Try fullscreen after the user's click.
      try {
        await document.documentElement.requestFullscreen();
      } catch (error) {
        // Fullscreen may be blocked by some browsers; the jumpscare still works.
      }
    });
  </script>
</body>
</html>
